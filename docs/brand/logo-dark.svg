<svg width="280" height="64" viewBox="0 0 280 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reputación — logo versión oscura">
  <defs>
    <linearGradient id="bgGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2563A0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="barGradDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3FC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dotGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FCD34D;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- ── ÍCONO (fondo ligeramente más claro para visibilidad en dark) ── -->
  <rect width="64" height="64" rx="16" fill="url(#bgGradDark)"/>

  <rect x="11" y="40" width="10" height="14" rx="3" fill="rgba(255,255,255,0.3)"/>
  <rect x="27" y="28" width="10" height="26" rx="3" fill="rgba(255,255,255,0.55)"/>
  <rect x="43" y="16" width="10" height="38" rx="3" fill="url(#barGradDark)"/>

  <circle cx="48" cy="11" r="5" fill="url(#dotGradDark)"/>
  <path d="M48 7.5 L48.9 10.1 L51.7 10.1 L49.4 11.8 L50.3 14.4 L48 12.7 L45.7 14.4 L46.6 11.8 L44.3 10.1 L47.1 10.1 Z"
        fill="#FFFBEB" opacity="0.95"/>

  <!-- ── WORDMARK versión clara ── -->
  <text
    x="82" y="28"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="700"
    fill="#F1F5F9"
    letter-spacing="-0.3">Reputación</text>

  <rect x="82" y="34" width="40" height="1.5" rx="1" fill="#38BDF8" opacity="0.8"/>

  <text
    x="82" y="50"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="10"
    font-weight="500"
    fill="#94A3B8"
    letter-spacing="2.2">ÍNDICE EMPRESARIAL</text>
</svg>
